name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        # to build mac/linux too, add: macos-latest, ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build ingester
        run: npm run build -w @mcpviz/ingester

      - name: Build viz
        run: npm run build -w @mcpviz/viz

      - name: Build Electron main
        run: npm run build:main -w @mcpviz/app

      - name: Package + publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -w @mcpviz/app
