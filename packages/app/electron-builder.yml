appId: com.dreidel.mcpvisualizer
productName: MCPVisualizer
copyright: Copyright © 2026 Yusuf Bektas
electronVersion: 33.2.0

directories:
  output: release
  buildResources: build

# Everything we ship lives under packages/app/dist/ — the ingester server
# and the built viz are copied there by scripts/copy-bundled.mjs as part
# of the build. Runtime deps (express, cors, fast-glob, etc.) are declared
# as dependencies in package.json so electron-builder bundles them.
files:
  - dist/**/*
  - package.json

asar: true
asarUnpack:
  - "**/*.node"
  - "**/tree-sitter-wasms/out/*.wasm"

win:
  target:
    - nsis
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  category: Development

publish:
  - provider: github
    owner: agolho
    repo: MCPVisualizer
    releaseType: release
